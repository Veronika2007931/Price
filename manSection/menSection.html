<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenSection</title>
     <link rel="stylesheet" href="./man.css">
     <link rel="stylesheet" href="../index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body class="section">
    <section class="hairsection">
        <h3 class="menHead">ПОСЛУГИ ДЛЯ ЧОЛОВІКІВ</h3>
        
        <ul class="man-list">
            <li class="man-item">
                <div class="info-block">
                    <p class="mainName">Стрижка дитяча <span class="span">|</span></p>
                </div>
                <div class="price-block single-column">
                    <div class="price-row justify-end">
                        <span class="price-value">300 грн</span>
                    </div>
                </div>
            </li>

            <li class="man-item">
                <div class="info-block">
                    <p class="mainName">Стрижка підліткова <span class="span">|</span></p>
                </div>
                <div class="price-block single-column">
                    <div class="price-row justify-end">
                        <span class="price-value">400 грн</span>
                    </div>
                </div>
            </li>

            <li class="man-item">
                <div class="info-block">
                    <p class="mainName">Стрижка чоловіча <span class="span">|</span></p>
                </div>
                <div class="price-block single-column">
                    <div class="price-row justify-end">
                        <span class="price-value">450-500 грн</span>
                    </div>
                </div>
            </li>

            <li class="man-item">
                <div class="info-block">
                    <p class="mainName">Корекція бороди <span class="span">|</span></p>
                </div>
                <div class="price-block single-column">
                    <div class="price-row justify-end">
                        <span class="price-value">300 грн</span>
                    </div>
                </div>
            </li>

            <li class="man-item">
                <div class="info-block">
                    <p class="mainName">Камуфляж сивини <span class="span">|</span></p>
                </div>
                <div class="price-block single-column">
                    <div class="price-row justify-end">
                        <span class="price-value">400 грн</span>
                    </div>
                </div>
            </li>
        </ul>

       
    </section>
</body>
</html>
